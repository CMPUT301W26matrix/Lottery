name: Generate and Publish Javadoc

on:
  push:
    branches: ["main"]
    paths-ignore:
      - ".github/**"
      - "**.md"

jobs:
  publish_javadoc:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: Lottery

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Enable execute permission for gradlew
        run: chmod +x gradlew

      - name: Add google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate Javadoc
        run: ./gradlew generateJavadoc

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: true
          folder: Lottery/javadocs
          target-folder: javadoc
