name: Generate Javadoc

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "Lottery/javadocs/**"
      - ".github/**"
      - "**.md"

jobs:
  Generate_javadoc:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: Lottery

    steps:
      - uses: actions/checkout@v6
      - name: set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Enable execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate Javadoc
        run: ./gradlew generateJavadoc

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: Lottery/javadocs
          body: Automated Update Javadocs
          branch: docs/update-javadoc
          commit-message: "docs: update javadocs"
          delete-branch: true
          title: "Update Javadocs"
